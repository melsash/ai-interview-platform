name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-auth-${{ hashFiles('services/auth/requirements.txt') }}

      - name: Install dependencies
        working-directory: services/auth
        run: |
          pip install -r requirements.txt
          pip install aiosqlite  # for in-memory test DB

      - name: Run linter
        working-directory: services/auth
        run: ruff check app/

      - name: Run tests
        working-directory: services/auth
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum-32-chars-long
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          ENVIRONMENT: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/auth/coverage.xml
          flags: auth-service

  lint-all:
    name: Lint All Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check services/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-auth]
    steps:
      - uses: actions/checkout@v4
      - name: Build auth service image
        run: docker build services/auth -t ai-interview-auth:ci
